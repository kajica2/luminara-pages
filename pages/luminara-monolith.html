  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Franklin';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"fb43a4e4-d217-4e5b-919b-1f03843e49b6\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  :root {\n    --bone: #F5F0E8;\n    --ink: #1A1714;\n    --warm-gray: #8A827A;\n    --amber: #C4956A;\n    --amber-dim: #C4956A33;\n    --deep: #2C2620;\n    --cream: #FAF7F2;\n    --rust: #A0634B;\n    --fog: #D4CFC7;\n  }\n\n  * {\n    margin: 0;\n    padding: 0;\n    box-sizing: border-box;\n  }\n\n  html {\n    scroll-behavior: smooth;\n    font-size: 16px;\n  }\n\n  body {\n    font-family: 'Libre Franklin', sans-serif;\n    font-weight: 300;\n    background: var(--bone);\n    color: var(--ink);\n    line-height: 1.7;\n    overflow-x: hidden;\n    -webkit-font-smoothing: antialiased;\n  }\n\n  ::selection {\n    background: var(--amber-dim);\n    color: var(--ink);\n  }\n\n  /* ─── NAV ─── */\n  nav {\n    position: fixed;\n    top: 0;\n    left: 0;\n    right: 0;\n    z-index: 100;\n    padding: 1.5rem 3rem;\n    display: flex;\n    justify-content: space-between;\n    align-items: center;\n    mix-blend-mode: difference;\n    transition: opacity 0.6s ease;\n  }\n\n  nav .logo {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-size: 1.15rem;\n    letter-spacing: 0.35em;\n    text-transform: uppercase;\n    color: #fff;\n  }\n\n  nav .nav-links {\n    display: flex;\n    gap: 2.5rem;\n    list-style: none;\n  }\n\n  nav .nav-links a {\n    font-size: 0.75rem;\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: #fff;\n    text-decoration: none;\n    opacity: 0.7;\n    transition: opacity 0.3s ease;\n    font-weight: 400;\n  }\n\n  nav .nav-links a:hover {\n    opacity: 1;\n  }\n\n  /* ─── HERO ─── */\n  .hero {\n    min-height: 100vh;\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    text-align: center;\n    padding: 6rem 2rem;\n    position: relative;\n    background: var(--ink);\n    overflow: hidden;\n  }\n\n  .hero::before {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background:\n      radial-gradient(ellipse 80% 60% at 50% 40%, #3A2E2200 0%, #1A171400 100%),\n      radial-gradient(ellipse 40% 40% at 30% 60%, #C4956A08 0%, transparent 70%),\n      radial-gradient(ellipse 40% 40% at 70% 40%, #A0634B06 0%, transparent 70%);\n    animation: heroGlow 12s ease-in-out infinite alternate;\n  }\n\n  @keyframes heroGlow {\n    0% { opacity: 0.6; }\n    100% { opacity: 1; }\n  }\n\n  .hero::after {\n    content: '';\n    position: absolute;\n    inset: 0;\n    background: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E\");\n    pointer-events: none;\n  }\n\n  .hero-content {\n    position: relative;\n    z-index: 2;\n    max-width: 800px;\n  }\n\n  .hero-eyebrow {\n    font-size: 0.7rem;\n    letter-spacing: 0.4em;\n    text-transform: uppercase;\n    color: var(--amber);\n    margin-bottom: 3rem;\n    opacity: 0;\n    animation: fadeUp 1s ease 0.3s forwards;\n    font-weight: 400;\n  }\n\n  .hero h1 {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-size: clamp(3.5rem, 8vw, 7rem);\n    letter-spacing: 0.15em;\n    text-transform: uppercase;\n    color: var(--cream);\n    line-height: 1.1;\n    margin-bottom: 2.5rem;\n    opacity: 0;\n    animation: fadeUp 1.2s ease 0.5s forwards;\n  }\n\n  .hero-line {\n    width: 60px;\n    height: 1px;\n    background: var(--amber);\n    margin: 0 auto 2.5rem;\n    opacity: 0;\n    animation: fadeUp 1s ease 0.7s forwards;\n  }\n\n  .hero p {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-style: italic;\n    font-size: clamp(1.15rem, 2.5vw, 1.45rem);\n    color: var(--fog);\n    line-height: 1.8;\n    max-width: 520px;\n    margin: 0 auto;\n    opacity: 0;\n    animation: fadeUp 1s ease 0.9s forwards;\n  }\n\n  .scroll-indicator {\n    position: absolute;\n    bottom: 3rem;\n    left: 50%;\n    transform: translateX(-50%);\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    gap: 0.75rem;\n    opacity: 0;\n    animation: fadeUp 1s ease 1.4s forwards;\n  }\n\n  .scroll-indicator span {\n    font-size: 0.6rem;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--warm-gray);\n  }\n\n  .scroll-indicator .line {\n    width: 1px;\n    height: 40px;\n    background: linear-gradient(to bottom, var(--warm-gray), transparent);\n    animation: scrollPulse 2s ease-in-out infinite;\n  }\n\n  @keyframes scrollPulse {\n    0%, 100% { opacity: 0.3; transform: scaleY(1); }\n    50% { opacity: 0.8; transform: scaleY(1.2); }\n  }\n\n  @keyframes fadeUp {\n    from { opacity: 0; transform: translateY(20px); }\n    to { opacity: 1; transform: translateY(0); }\n  }\n\n  /* ─── SECTIONS ─── */\n  section {\n    padding: 8rem 2rem;\n  }\n\n  .container {\n    max-width: 720px;\n    margin: 0 auto;\n  }\n\n  .container-wide {\n    max-width: 1080px;\n    margin: 0 auto;\n  }\n\n  /* ─── PREMISE ─── */\n  .premise {\n    background: var(--cream);\n    border-top: 1px solid var(--fog);\n    border-bottom: 1px solid var(--fog);\n  }\n\n  .premise .container p {\n    font-family: 'Cormorant Garamond', serif;\n    font-size: clamp(1.25rem, 2.8vw, 1.6rem);\n    font-weight: 400;\n    line-height: 2;\n    color: var(--deep);\n    margin-bottom: 1.5rem;\n  }\n\n  .premise .container p:last-child {\n    margin-bottom: 0;\n  }\n\n  .premise .container p em {\n    font-style: italic;\n    color: var(--rust);\n  }\n\n  .premise .container p strong {\n    font-weight: 500;\n  }\n\n  /* ─── QUOTE BREAK ─── */\n  .quote-break {\n    background: var(--ink);\n    padding: 6rem 2rem;\n    text-align: center;\n  }\n\n  .quote-break blockquote {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-style: italic;\n    font-size: clamp(1.3rem, 3vw, 1.8rem);\n    color: var(--cream);\n    max-width: 600px;\n    margin: 0 auto;\n    line-height: 1.9;\n  }\n\n  .quote-break .attribution {\n    margin-top: 2rem;\n    font-size: 0.7rem;\n    letter-spacing: 0.3em;\n    text-transform: uppercase;\n    color: var(--amber);\n    font-family: 'Libre Franklin', sans-serif;\n    font-weight: 400;\n  }\n\n  /* ─── WHAT IT IS ─── */\n  .what-it-is {\n    background: var(--bone);\n  }\n\n  .section-label {\n    font-size: 0.65rem;\n    letter-spacing: 0.4em;\n    text-transform: uppercase;\n    color: var(--amber);\n    margin-bottom: 3rem;\n    font-weight: 400;\n  }\n\n  .what-it-is h2 {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 400;\n    font-size: clamp(2rem, 4vw, 2.8rem);\n    color: var(--ink);\n    line-height: 1.3;\n    margin-bottom: 2.5rem;\n    max-width: 500px;\n  }\n\n  .what-it-is .body-text {\n    font-size: 1rem;\n    color: var(--deep);\n    line-height: 1.85;\n    margin-bottom: 1.5rem;\n  }\n\n  .what-it-is .body-text:last-of-type {\n    margin-bottom: 0;\n  }\n\n  /* ─── PILLARS ─── */\n  .pillars {\n    background: var(--cream);\n    border-top: 1px solid var(--fog);\n  }\n\n  .pillars-grid {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: 3rem;\n    margin-top: 3rem;\n  }\n\n  .pillar {\n    padding: 2.5rem 0;\n    border-top: 1px solid var(--ink);\n  }\n\n  .pillar-number {\n    font-family: 'Cormorant Garamond', serif;\n    font-size: 0.85rem;\n    color: var(--warm-gray);\n    margin-bottom: 1.5rem;\n    font-weight: 400;\n    letter-spacing: 0.1em;\n  }\n\n  .pillar h3 {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 400;\n    font-size: 1.5rem;\n    color: var(--ink);\n    margin-bottom: 1.25rem;\n    line-height: 1.3;\n  }\n\n  .pillar p {\n    font-size: 0.9rem;\n    color: var(--warm-gray);\n    line-height: 1.75;\n  }\n\n  /* ─── THE BOOK ─── */\n  .the-book {\n    background: var(--deep);\n    position: relative;\n    overflow: hidden;\n  }\n\n  .the-book::before {\n    content: '';\n    position: absolute;\n    top: -50%;\n    right: -20%;\n    width: 600px;\n    height: 600px;\n    background: radial-gradient(circle, var(--amber-dim) 0%, transparent 70%);\n    pointer-events: none;\n  }\n\n  .book-layout {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 5rem;\n    align-items: center;\n    position: relative;\n    z-index: 2;\n  }\n\n  .book-info .section-label {\n    color: var(--amber);\n  }\n\n  .book-info h2 {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-size: clamp(2rem, 4vw, 2.6rem);\n    color: var(--cream);\n    line-height: 1.35;\n    margin-bottom: 2rem;\n  }\n\n  .book-info h2 em {\n    font-style: italic;\n    color: var(--amber);\n  }\n\n  .book-info p {\n    font-size: 0.95rem;\n    color: var(--fog);\n    line-height: 1.8;\n    margin-bottom: 1.5rem;\n  }\n\n  .book-cta {\n    display: inline-flex;\n    align-items: center;\n    gap: 1rem;\n    margin-top: 1.5rem;\n    font-size: 0.75rem;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--amber);\n    text-decoration: none;\n    font-weight: 400;\n    transition: gap 0.3s ease;\n  }\n\n  .book-cta:hover {\n    gap: 1.5rem;\n  }\n\n  .book-cta .arrow {\n    width: 40px;\n    height: 1px;\n    background: var(--amber);\n    position: relative;\n    transition: width 0.3s ease;\n  }\n\n  .book-cta:hover .arrow {\n    width: 55px;\n  }\n\n  .book-cta .arrow::after {\n    content: '';\n    position: absolute;\n    right: 0;\n    top: -3px;\n    width: 7px;\n    height: 7px;\n    border-top: 1px solid var(--amber);\n    border-right: 1px solid var(--amber);\n    transform: rotate(45deg);\n  }\n\n  .book-visual {\n    display: flex;\n    justify-content: center;\n    align-items: center;\n  }\n\n  .book-mockup {\n    width: 260px;\n    height: 370px;\n    background: linear-gradient(145deg, #2A2318, #1E1A14);\n    border-radius: 2px 12px 12px 2px;\n    box-shadow:\n      -4px 0 0 #181510,\n      -6px 0 0 #14110D,\n      12px 12px 40px rgba(0,0,0,0.5),\n      0 0 80px var(--amber-dim);\n    display: flex;\n    flex-direction: column;\n    justify-content: center;\n    align-items: center;\n    padding: 3rem 2rem;\n    text-align: center;\n    position: relative;\n    overflow: hidden;\n  }\n\n  .book-mockup::before {\n    content: '';\n    position: absolute;\n    top: 0;\n    left: 0;\n    right: 0;\n    bottom: 0;\n    background:\n      linear-gradient(135deg, rgba(196,149,106,0.08) 0%, transparent 50%),\n      radial-gradient(ellipse at 30% 20%, rgba(196,149,106,0.05) 0%, transparent 60%);\n    pointer-events: none;\n  }\n\n  .book-mockup .book-title {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-size: 1.8rem;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--amber);\n    position: relative;\n    z-index: 1;\n  }\n\n  .book-mockup .book-subtitle {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-style: italic;\n    font-size: 0.8rem;\n    color: var(--fog);\n    margin-top: 0.75rem;\n    letter-spacing: 0.1em;\n    position: relative;\n    z-index: 1;\n    opacity: 0.7;\n  }\n\n  .book-mockup .book-author {\n    font-family: 'Libre Franklin', sans-serif;\n    font-weight: 300;\n    font-size: 0.6rem;\n    letter-spacing: 0.35em;\n    text-transform: uppercase;\n    color: var(--fog);\n    position: absolute;\n    bottom: 2.5rem;\n    opacity: 0.5;\n  }\n\n  .book-mockup .book-line {\n    width: 30px;\n    height: 1px;\n -size: clamp(1.8rem, 3.5vw, 2.4rem);\n    color: var(--cream);\n    margin-bottom: 1rem;\n  }\n\n  .subscribe .sub-desc {\n    font-size: 0.9rem;\n    color: var(--warm-gray);\n    margin-bottom: 2.5rem;\n    line-height: 1.7;\n  }\n\n  .subscribe-form {\n    display: flex;\n    gap: 0;\n    max-width: 440px;\n    margin: 0 auto;\n  }\n\n  .subscribe-form input {\n    flex: 1;\n    padding: 1rem 1.25rem;\n    border: 1px solid #3A352E;\n    background: transparent;\n    color: var(--cream);\n    font-family: 'Libre Franklin', sans-serif;\n    font-size: 0.85rem;\n    font-weight: 300;\n    letter-spacing: 0.05em;\n    outline: none;\n    transition: border-color 0.3s ease;\n  }\n\n  .subscribe-form input::placeholder {\n    color: #5A544D;\n  }\n\n  .subscribe-form input:focus {\n    border-color: var(--amber);\n  }\n\n  .subscribe-form button {\n    padding: 1rem 2rem;\n    background: var(--amber);\n    color: var(--ink);\n    border: 1px solid var(--amber);\n    font-family: 'Libre Franklin', sans-serif;\n    font-size: 0.7rem;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    font-weight: 500;\n    cursor: pointer;\n    transition: all 0.3s ease;\n  }\n\n  .subscribe-form button:hover {\n    background: transparent;\n    color: var(--amber);\n  }\n\n  /* ─── FOOTER ─── */\n  footer {\n    background: var(--deep);\n    padding: 3rem 2rem;\n    text-align: center;\n  }\n\n  footer .footer-logo {\n    font-family: 'Cormorant Garamond', serif;\n    font-weight: 300;\n    font-size: 0.9rem;\n    letter-spacing: 0.35em;\n    text-transform: uppercase;\n    color: var(--fog);\n    opacity: 0.4;\n    margin-bottom: 1.5rem;\n  }\n\n  footer p {\n    font-size: 0.7rem;\n    color: var(--warm-gray);\n    opacity: 0.4;\n    letter-spacing: 0.1em;\n  }\n\n  /* ─── RESPONSIVE ─── */\n  @media (max-width: 768px) {\n    nav {\n      padding: 1.25rem 1.5rem;\n    }\n\n    nav .nav-links {\n      gap: 1.5rem;\n    }\n\n    section {\n      padding: 5rem 1.5rem;\n    }\n\n    .pillars-grid {\n      grid-template-columns: 1fr;\n      gap: 0;\n    }\n\n    .book-layout {\n      grid-template-columns: 1fr;\n      gap: 3rem;\n      text-align: center;\n    }\n\n    .book-visual {\n      order: -1;\n    }\n\n    .book-mockup {\n      width: 200px;\n      height: 285px;\n    }\n\n    .about-layout {\n      grid-template-columns: 1fr;\n      gap: 3rem;\n    }\n\n    .about-photo {\n      max-width: 300px;\n    }\n\n    .subscribe-form {\n      flex-direction: column;\n    }\n\n    .subscribe-form button {\n      padding: 1rem;\n    }\n  }\n\n  /* ─── FADE IN ON SCROLL ─── */\n  .fade-in {\n    opacity: 0;\n    transform: translateY(24px);\n    transition: opacity 0.8s ease, transform 0.8s ease;\n  }\n\n  .fade-in.visible {\n    opacity: 1;\n    transform: translateY(0);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- NAV -->\n<nav>\n  <div class=\"logo\">Luminara<\u002Fdiv>\n  <ul class=\"nav-links\">\n    <li><a href=\"#about\">About<\u002Fa><\u002Fli>\n    <li><a href=\"#book\">The Book<\u002Fa><\u002Fli>\n    <li><a href=\"#subscribe\">Connect<\u002Fa><\u002Fli>\n  <\u002Ful>\n<\u002Fnav>\n\n<!-- HERO -->\n<section class=\"hero\">\n  <div class=\"hero-content\">\n    <div class=\"hero-eyebrow\">A system by Kai Djuric<\u002Fdiv>\n    <h1>Luminara<\u002Fh1>\n    <div class=\"hero-line\"><\u002Fdiv>\n    <p>Your external world is a mirror of your internal frequency. Not sometimes. Always.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"scroll-indicator\">\n    <span>Scroll<\u002Fspan>\n    <div class=\"line\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PREMISE -->\n<section class=\"premise\">\n  <div class=\"container fade-in\">\n    <p>You already know something is off.<\u002Fp>\n    <p>Not broken. Not wrong. Just... <em>misaligned<\u002Fem>. The same patterns keep showing up. The same feelings follow you from room to room, city to city, year to year.<\u002Fp>\n    <p>You have tried to think your way out. Meditate your way out. Work your way out.<\u002Fp>\n    <p><strong>LUMINARA starts somewhere else entirely.<\u002Fstrong><\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- QUOTE -->\n<section class=\"quote-break\">\n  <blockquote class=\"fade-in\">\n    \"Change the signal, and the reflections change.\"\n  <\u002Fblockquote>\n  <div class=\"attribution fade-in\">— Kai Djuric<\u002Fdiv>\n<\u002Fsection>\n\n<!-- WHAT IT IS -->\n<section class=\"what-it-is\" id=\"about\">\n  <div class=\"container\">\n    <div class=\"section-label fade-in\">What Luminara Is<\u002Fdiv>\n    <h2 class=\"fade-in\">Not a method.<br>A way of meeting yourself through sound.<\u002Fh2>\n    <p class=\"body-text fade-in\">LUMINARA is a system built on one principle: frequency is not a metaphor. It is measurable. It is physical. And it changes everything — your nervous system, your relationships, your experience of being alive.<\u002Fp>\n    <p class=\"body-text fade-in\">This is not about positive thinking. Not about affirmations taped to your mirror. It is about learning to work with the signal your body is already emitting — and tuning it, deliberately, through the oldest instrument you have.<\u002Fp>\n    <p class=\"body-text fade-in\">Your voice.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PILLARS -->\n<section class=\"pillars\">\n  <div class=\"container-wide\">\n    <div class=\"section-label fade-in\">Three Foundations<\u002Fdiv>\n    <div class=\"pillars-grid\">\n      <div class=\"pillar fade-in\">\n        <div class=\"pillar-number\">01<\u002Fdiv>\n        <h3>Frequency<\u002Fh3>\n        <p>Everything vibrates. Your thoughts, your cells, your words. LUMINARA teaches you to read frequency like a language — in your body, your voice, your relationships. Not as metaphor. As fact.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar fade-in\">\n        <div class=\"pillar-number\">02<\u002Fdiv>\n        <h3>Voice<\u002Fh3>\n        <p>Your voice is the most powerful instrument you have. Full stop. It bypasses the mind and reaches the nervous system directly. LUMINARA shows you how to use it — not to perform, but to heal.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"pillar fade-in\">\n        <div class=\"pillar-number\">03<\u002Fdiv>\n        <h3>Resonance<\u002Fh3>\n        <p>When your internal frequency shifts, your external world rearranges. Not through force. Through coherence. The relationships, situations, and feelings that follow you everywhere — they are not random. They are resonant.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- THE BOOK -->\n<section class=\"the-book\" id=\"book\">\n  <div class=\"container-wide\">\n    <div class=\"book-layout\">\n      <div class=\"book-info\">\n        <div class=\"section-label fade-in\">The Book<\u002Fdiv>\n        <h2 class=\"fade-in\"><em>The Resonance of Wholeness<\u002Fem><\u002Fh2>\n        <p class=\"fade-in\">This is not a self-help book. It will not tell you to think positive or hustle harder. It will ask you to listen. To your body. To the signal beneath the noise.<\u002Fp>\n        <p class=\"fade-in\">Part science, part practice, part confrontation — it walks you through the LUMINARA system from the ground up. By the end, you will not just understand frequency. You will feel it.<\u002Fp>\n        <a href=\"#\" class=\"book-cta fade-in\">\n          Read the first chapter\n          <span class=\"arrow\"><\u002Fspan>\n        <\u002Fa>\n      <\u002Fdiv>\n      <div class=\"book-visual fade-in\">\n        <div class=\"book-mockup\">\n          <div class=\"book-title\">Luminara<\u002Fdiv>\n          <div class=\"book-line\"><\u002Fdiv>\n          <div class=\"book-subtitle\">The Resonance of Wholeness<\u002Fdiv>\n          <div class=\"book-author\">Kai Djuric<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- TESTIMONIAL -->\n<section class=\"testimonial\">\n  <blockquote class=\"fade-in\">\n    \"I read it expecting theory. Instead, I got something that made my body respond before my mind could catch up. I have never experienced a book like this.\"\n  <\u002Fblockquote>\n  <div class=\"reader fade-in\">— Early reader<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ABOUT KAI -->\n<section class=\"about\" id=\"kai\">\n  <div class=\"container-wide\">\n    <div class=\"about-layout\">\n      <div class=\"about-photo fade-in\"><\u002Fdiv>\n      <div class=\"about-text\">\n        <div class=\"section-label fade-in\">About<\u002Fdiv>\n        <h2 class=\"fade-in\">Kai Djuric<\u002Fh2>\n        <p class=\"fade-in\">Kai does not call himself a healer, a guru, or a teacher. He builds systems. LUMINARA came from years of personal work — from sitting with grief, from learning to listen to the body, from discovering that sound could do what willpower never could.<\u002Fp>\n        <p class=\"fade-in\">He writes the way he speaks: direct, spare, and without apology. His work sits at the intersection of frequency science, consciousness, and the lived experience of being human. No fluff. No borrowed wisdom. Just what is true, said plainly.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SUBSCRIBE -->\n<section class=\"subscribe\" id=\"subscribe\">\n  <div class=\"container fade-in\">\n    <h2>Stay close.<\u002Fh2>\n    <p class=\"sub-desc\">New writing, practices, and frequency work — delivered when it matters.<\u002Fp>\n    <form class=\"subscribe-form\" onsubmit=\"event.preventDefault(); this.querySelector('button').textContent = 'You\\'re in.'; this.querySelector('input').disabled = true;\">\n      <input type=\"email\" placeholder=\"Your email\" required=\"\">\n      <button type=\"submit\">Subscribe<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer>\n  <div class=\"footer-logo\">Luminara<\u002Fdiv>\n  <p>© 2026 Kai Djuric. All rights reserved.<\u002Fp>\n<\u002Ffooter>\n\n<script>\n  // Fade-in on scroll\n  cons
